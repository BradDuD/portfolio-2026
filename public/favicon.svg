<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">

  <!-- Background -->
  <rect width="32" height="32" fill="#071a22"/>

  <!-- Head -->
  <rect x="12" y="2" width="8" height="5" fill="#006fa0"/>
  <!-- Neck -->
  <rect x="14" y="7" width="4" height="2" fill="#006fa0"/>

  <!-- Monitor frame: top, left, right, bottom -->
  <rect x="4"  y="9"  width="24" height="2"  fill="#024554"/>
  <rect x="4"  y="9"  width="2"  height="14" fill="#024554"/>
  <rect x="26" y="9"  width="2"  height="14" fill="#024554"/>
  <rect x="4"  y="21" width="24" height="2"  fill="#024554"/>

  <!-- Screen -->
  <rect x="6" y="11" width="20" height="10" fill="#0b2533"/>

  <!-- B letter (pixel art) -->
  <rect x="8" y="12" width="4" height="2" fill="#00e5d0"/>
  <rect x="8" y="14" width="6" height="2" fill="#00e5d0"/>
  <rect x="8" y="16" width="4" height="2" fill="#00e5d0"/>
  <rect x="8" y="18" width="6" height="2" fill="#00e5d0"/>

  <!-- D letter (pixel art) -->
  <rect x="16" y="12" width="4" height="2" fill="#00e5d0"/>
  <rect x="16" y="14" width="2" height="2" fill="#00e5d0"/>
  <rect x="20" y="14" width="2" height="2" fill="#00e5d0"/>
  <rect x="16" y="16" width="2" height="2" fill="#00e5d0"/>
  <rect x="20" y="16" width="2" height="2" fill="#00e5d0"/>
  <rect x="16" y="18" width="4" height="2" fill="#00e5d0"/>

  <!-- Power LED -->
  <rect x="24" y="22" width="2" height="1" fill="#009688"/>

  <!-- Monitor stand -->
  <rect x="14" y="23" width="4" height="2" fill="#024554"/>

  <!-- Keyboard -->
  <rect x="4" y="25" width="24" height="4" fill="#024554"/>
  <!-- Key accents row 1 -->
  <rect x="6"  y="26" width="4" height="1" fill="#009688" opacity="0.55"/>
  <rect x="12" y="26" width="8" height="1" fill="#009688" opacity="0.55"/>
  <rect x="22" y="26" width="4" height="1" fill="#009688" opacity="0.55"/>
  <!-- Key accents row 2 -->
  <rect x="7"  y="28" width="2" height="1" fill="#009688" opacity="0.35"/>
  <rect x="11" y="28" width="2" height="1" fill="#009688" opacity="0.35"/>
  <rect x="15" y="28" width="4" height="1" fill="#009688" opacity="0.35"/>
  <rect x="21" y="28" width="2" height="1" fill="#009688" opacity="0.35"/>
  <rect x="25" y="28" width="2" height="1" fill="#009688" opacity="0.35"/>

</svg>
